services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    hostname: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "6881:6881/tcp" # qbitorrent
      - "6881:6881/udp" # qbitorrent
      - "8085:8085/tcp" # qbitorrent
      - "8191:8191/tcp" # flaresolverr
      - "9696:9696/tcp" # prowlarr
      - "7878:7878/tcp" # radarr
      - "8989:8989/tcp" # sonarr
    volumes:
      - ${TORRENT_GLUETUN_CONFIG_PATH}:/gluetun
    env_file:
      - .env
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - UPDATER_PERIOD=24h

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ${TORRENT_QBITTORRENT_CONFIG_PATH}:/config
      - ${TORRENT_QBITTORRENT_DATA_PATH}:/downloads
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8085
      - TORRENTING_PORT=6881

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    env_file:
      - .env
    environment:
      - TZ=${TZ}

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ${TORRENT_PROWLARR_CONFIG_PATH}:/config
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ${TORRENT_QBITTORRENT_DATA_PATH}:/downloads
      - ${TORRENT_RADARR_CONFIG_PATH}:/config
      - ${TORRENT_RADARR_MOVIES_PATH}:/movies
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:gluetun" 
    depends_on:
      - gluetun
    volumes:
      - ${TORRENT_QBITTORRENT_DATA_PATH}:/downloads
      - ${TORRENT_SONARR_CONFIG_PATH}:/config
      - ${TORRENT_SONARR_TV_PATH}:/tv
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
