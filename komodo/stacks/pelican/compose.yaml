services:
  panel:
    image: ${PELICAN_IMAGE:-ghcr.io/pelican-dev/panel:latest}
    container_name: pelican-panel
    restart: unless-stopped
    ports:
      - "${PELICAN_HTTP_PORT}:80"
      - "${PELICAN_HTTPS_PORT}:443"
    volumes:
      - ${PELICAN_DATA_PATH}:/pelican-data
      - ${PELICAN_LOGS_PATH}:/var/www/html/storage/logs
    env_file:
      - .env
    environment:
      - XDG_DATA_HOME=/pelican-data
      - APP_URL=${PELICAN_APP_URL}
      - ADMIN_EMAIL=${PELICAN_ADMIN_EMAIL}
